# Runtime args (overridden via CLI)
# audio_file: "/path/to/your/audio_or_directory"
audio_file: ???
output_dir: ./generated

# Input audio padding (set at most one; null = disabled)
pad_audio_to_sec: null       # Pad each audio to this fixed duration (seconds)
pad_silence_ratio: null      # Append silence = ratio * original duration (e.g. 0.2 = 20%)
pad_audio_by_sec: null       # Append this fixed number of extra seconds of silence

pipeline_type: s2s_streaming

# S2S model block
s2s:
  model_path: ???
  llm_checkpoint_path: ???
  speaker_reference: ???
  engine_type: ??? # Engine type: 'native' or 'vllm_llm' or 'vllm_eartts' or 'vllm_llm_vllm_eartts'
  vllm_llm_config:
    model_path: ${s2s.model_path}             # Inherits from s2s.model_path
    max_model_len: 8192                       # Maximum sequence length for vLLM
    gpu_memory_utilization: 0.35               # GPU memory utilization (0.0-1.0)
    dtype: bfloat16                           # Data type for vLLM inference
    engine_path: null                         # Path to vLLM engine (null = auto-convert if needed)
    pretrained_llm: ${s2s.llm_checkpoint_path}  # Inherits from s2s.llm_checkpoint_path
  
  vllm_tts_config:
    model_path: ${s2s.vllm_llm_config.model_path}             # Inherits from s2s.model_path
    max_model_len: ${s2s.vllm_llm_config.max_model_len}
    gpu_memory_utilization: ${s2s.vllm_llm_config.gpu_memory_utilization}
    dtype: float32                              # EarTTS requires float32 for proper audio quality (bfloat16 causes hallucinations)
    engine_path: null
    pretrained_llm: null
    skip_tokenizer_init: true

  device: cuda 
  # ========================
  # Device Configuration
  # ========================
  device_id: 0                                # GPU device ID
  compute_dtype: bfloat16                     # Compute precision: 'bfloat16' for Ampere+, 
                                              #                    'float16' for older GPUs 
                                              #                    'float32'
  # ========================
  # Inference settings
  # ========================
  codec_token_history_size: 60                # Sliding-window buffer size; ignored when use_codec_cache is true
  use_perception_cache: true                  # Enable cache-aware streaming for perception encoder
  use_perception_cudagraph: true              # Enable CUDA graph-accelerated perception encoder
  use_codec_cache: true                       # Incremental codec decode to remove clicking sounds and wasted computation
                                              # (when true, codec_token_history_size is unused)

  top_p: 1.0
  repetition_penalty: 1.0
  temperature: 1.0
  force_turn_taking: true
  force_turn_taking_threshold: 40
  force_turn_taking_pad_window: 25

  # Inference logit boosts (applied to model logits at inference time)
  inference_user_pad_boost: 0.2         # Boost ASR pad logit
  inference_user_bos_boost: null         # Boost ASR BOS logit
  inference_user_eos_boost: null         # Boost ASR EOS logit

  system_prompt: ???
  tts_system_prompt: null              # TTS system prompt - conditions TTS generation style
                                       # Requires a checkpoint trained with individual TTS prompts



# ========================
# Pipeline settings
# ========================
matmul_precision: medium                     # Matrix multiplication precision: highest, high, medium

streaming:
  input_sample_rate: 16000                          # Audio sample rate in Hz
  output_sample_rate: 22050                          # Audio sample rate in Hz
  batch_size: 1                               # Number of audio frames per batch
  att_context_size: [70,0]                    # Attention context size: [70,13],[70,6],[70,2],[70,0]
  chunk_size_in_secs: ???                    # Needs to be multiple of 80ms
  buffer_size_in_secs: ???                    # Audio buffer size in seconds (larger = more context, better quality)
  request_type: frame                         # Type of request: frame, only frame is supported for cache-aware streaming
  max_len: 8192
